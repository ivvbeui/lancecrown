<script type="module">
    // 1. 필요한 기능들을 파이어베이스에서 직접 불러옵니다.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 2. 외부 파일 분리 대신, 여기에 파이어베이스 설정을 직접 넣어줍니다.
    const firebaseConfig = {
      apiKey: "AIzaSyCUTHfXL4S5BL8AhKB_PZcNGhQqZFU74rw",
      authDomain: "my-home-86c46.firebaseapp.com",
      projectId: "my-home-86c46",
      storageBucket: "my-home-86c46.firebasestorage.app",
      messagingSenderId: "291756289238",
      appId: "1:291756289238:web:ecb3c3ccc8066dd91a2d77",
      measurementId: "G-4J44LK94E0"
    };

    // 3. 파이어베이스 및 데이터베이스(db) 초기화
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 4. 업로드 기능 실행
    document.getElementById('postForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const title = document.getElementById('title').value;
        const type = document.getElementById('type').value;
        const content = document.getElementById('content').value;

        const now = new Date();
        const dateStr = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}`;

        try {
            // 이제 db가 확실하게 정의되어 있으므로 에러 없이 올라갑니다!
            await addDoc(collection(db, "posts"), {
                title: title,
                type: type,
                content: content,
                date: dateStr
            });

            alert("성공적으로 업로드되었습니다! (딸깍 완료)");
            document.getElementById('postForm').reset();
        } catch (error) {
            console.error("업로드 에러:", error);
            alert("업로드 실패했습니다. 콘솔 창의 에러 메시지를 확인해보세요.");
        }
    });
</script>
