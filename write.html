<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글 작성 페이지</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background-color: #fafafa; color: #333; }
        .form-container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border: 1px solid #ddd; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: bold; }
        input[type="text"], select, textarea, input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 13px; }
        textarea { resize: vertical; }
        button { background: black; color: white; border: none; padding: 12px 20px; cursor: pointer; width: 100%; font-size: 13px; }
        button:hover { opacity: 0.8; }
        #image-group { display: none; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>새 글 쓰기</h2>
    <form id="postForm">
        <div class="form-group">
            <label for="title">제목</label>
            <input type="text" id="title" placeholder="제목을 입력하세요." required>
        </div>
        <div class="form-group">
            <label for="type">분류</label>
            <select id="type" required>
                <option value="notice">notice</option>
                <option value="list">list</option>
                <option value="gallery">gallery</option>
            </select>
        </div>
        <div class="form-group" id="image-group">
            <label for="imageFile">이미지 업로드 (Gallery 전용)</label>
            <input type="file" id="imageFile" accept="image/*">
        </div>
        <div class="form-group">
            <label for="content">내용</label>
            <textarea id="content" rows="10" placeholder="내용을 입력하세요." required></textarea>
        </div>
        <button type="submit">작성 완료</button>
    </form>
</div>

<script type="module">
    import { db, storage } from "./firebase-config.js";
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const typeSelect = document.getElementById('type');
    const imageGroup = document.getElementById('image-group');
    const imageInput = document.getElementById('imageFile');

    typeSelect.addEventListener('change', () => {
        if (typeSelect.value === 'gallery') {
            imageGroup.style.display = 'block';
            imageInput.required = true;
        } else {
            imageGroup.style.display = 'none';
            imageInput.required = false;
            imageInput.value = ""; 
        }
    });

    document.getElementById('postForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const title = document.getElementById('title').value;
        const type = document.getElementById('type').value;
        const content = document.getElementById('content').value;
        const imageFile = imageInput.files[0];

        const now = new Date();
        const dateStr = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}`;
        const timestamp = now.getTime();

        try {
            let imageUrl = "";

            if (type === 'gallery' && imageFile) {
                const storageRef = ref(storage, `gallery/${timestamp}_${imageFile.name}`);
                const snapshot = await uploadBytes(storageRef, imageFile);
                imageUrl = await getDownloadURL(snapshot.ref);
            }

            // 🚨 쉼표 오타 완벽 제거 및 정상 업로드 코드
            await addDoc(collection(db, "posts"), {
                title: title,
                type: type,
                content: content,
                date: dateStr,
                timestamp: timestamp, 
                imageUrl: imageUrl     
            });

            alert("🎉 성공적으로 복구 및 업로드되었습니다!");
            document.getElementById('postForm').reset();
            imageGroup.style.display = 'none';

        } catch (error) {
            alert("구글 서버 에러 발생: " + error.message);
            console.error(error);
        }
    });
</script>
</body>
</html>
