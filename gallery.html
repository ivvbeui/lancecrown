<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through love - Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>
    <div class="main-container">
        <div class="inner-frame">

            <div class="left-sidebar">
                <div class="header-text">
                    <h1 class="blog-name">La Via Lactea</h1>
                    <p class="status-text" onclick="toggleProfile()">from 2024~</p>
                </div>
                <div id="profile-section" class="profile-box collapsed">
                    <div class="gray-rect profile-img">
                      <img src="img/profile.webp" alt="프로필">
                    </div>
                </div>
                <div class="menu-box">
                    <div class="emoji-row">
                        <span class="emoji" onclick="toggleMenu(0)">🫂</span>
                        <span class="emoji" onclick="toggleMenu(1)">🎥</span>
                        <span class="emoji" onclick="toggleMenu(2)">🏠</span>
                    </div>
                    <div class="menu-list-container">
                        <div id="list-0" class="list-item">
                            <p><a href="index.html">home</a></p>
                            <p><a href="notice.html">notice</a></p>
                        </div>
                        <div id="list-1" class="list-item">
                            <p><a href="list.html">list</a></p>
                            <p><a href="gallery.html">gallery</a></p>
                        </div>
                        <div id="list-2" class="list-item">
                            <p>ing...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-content">
                <div class="board-container">
                    <div class="board-header">gallery</div>

                    <div class="gallery-grid" id="gallery-container">
                        </div>

                    <div class="pagination">
                        <span class="btn" id="prev-btn">&lt;</span>
                        <span id="page-num">1 / 1</span>
                        <span class="btn" id="next-btn">&gt;</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        async function loadGalleryPosts() {
            const galleryContainer = document.getElementById('gallery-container');
            if (!galleryContainer) return;

            try {
                // 타입이 'gallery'인 글만 쏙 골라오기
                const q = query(collection(db, "posts"), where("type", "==", "gallery"));
                const querySnapshot = await getDocs(q);

                galleryContainer.innerHTML = "";

                if (querySnapshot.empty) {
                    galleryContainer.innerHTML = "<p style='font-size:12px; color:#999; padding:10px; grid-column: span 3;'>등록된 사진이 없습니다.</p>";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();

                    // 만약 업로드된 이미지가 있으면 그 이미지를 쓰고, 없으면 기본 썸네일 노출
                    const displayImg = data.imageUrl ? data.imageUrl : "img/gall1.png";

                    const postHTML = `
                        <a href="post.html?id=${doc.id}" class="gallery-item gray-rect">
                            <img src="${displayImg}" alt="${data.title}">
                        </a>
                    `;
                    galleryContainer.innerHTML += postHTML;
                });

            } catch (error) {
                console.error("갤러리 로딩 에러:", error);
            }
        }

        window.addEventListener("DOMContentLoaded", loadGalleryPosts);
    </script>
</body>
</html>
