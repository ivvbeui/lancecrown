<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through love</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>
    <div class="main-container">
        <div class="inner-frame">

            <div class="left-sidebar">
                <div class="header-text">
                    <h1 class="blog-name">La Via Lactea</h1>
                    <p class="status-text" onclick="toggleProfile()">from 2024~</p>
                </div>
                <div id="profile-section" class="profile-box collapsed">
                    <div class="gray-rect profile-img">
                      <img src="img/profile.webp" alt="프로필">
                    </div>
                </div>
                <div class="menu-box">
                    <div class="emoji-row">
                        <span class="emoji" onclick="toggleMenu(0)">🫂</span>
                        <span class="emoji" onclick="toggleMenu(1)">🎥</span>
                        <span class="emoji" onclick="toggleMenu(2)">🏠</span>
                    </div>
                    <div class="menu-list-container">
                        <div id="list-0" class="list-item">
                          <p><a href="index.html">home</a></p>
                          <p><a href="notice.html">notice</a></p>
                        </div>
                        <div id="list-1" class="list-item">
                          <p><a href="list.html">list</a></p>
                          <p><a href="gallery.html">gallery</a></p>
                        </div>
                        <div id="list-2" class="list-item">
                            <p>ing...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-content">
                <div class="board-container post-scroll-container">
                    <div class="post-detail-header">
                        <h2 class="post-detail-title" id="post-title">불러오는 중...</h2>
                        <p class="post-detail-meta" id="post-meta"></p>
                    </div>

                    <div class="post-detail-body">
                        <p id="post-content"></p>

                        <div class="bottom-bars" id="post-images">
                          <div class="dark-gray-bar"><img src="img/gall1.png" alt="사진1"></div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script> 
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCUTHfXL4S5BL8AhKB_PZcNGhQqZFU74rw",
          authDomain: "my-home-86c46.firebaseapp.com",
          projectId: "my-home-86c46",
          storageBucket: "my-home-86c46.firebasestorage.app",
          messagingSenderId: "291756289238",
          appId: "1:291756289238:web:ecb3c3ccc8066dd91a2d77",
          measurementId: "G-4J44LK94E0"
        };

        // 파이어베이스와 db를 안전하게 초기화합니다.
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function getPostDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');

            if (!postId) {
                alert("잘못된 접근입니다.");
                location.href = "list.html";
                return;
            }

            try {
                const docRef = doc(db, "posts", postId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();

                    // 데이터를 화면에 매칭하기
                    document.getElementById('post-title').innerText = data.title;
                    document.getElementById('post-meta').innerText = `${data.type} / ${data.date}`;
                    document.getElementById('post-content').innerHTML = data.content.replace(/\n/g, '<br>');

                    if(data.type === 'list') {
                        document.getElementById('post-images').style.display = 'none';
                    } else {
                        document.getElementById('post-images').style.display = 'flex';
                    }

                } else {
                    document.getElementById('post-title').innerText = "삭제되거나 존재하지 않는 게시글입니다.";
                }
            } catch (error) {
                console.error("데이터 로드 중 에러 발생:", error);
                document.getElementById('post-title').innerText = "데이터를 불러오지 못했습니다.";
            }
        }

        // 페이지가 로드되면 실행
        document.addEventListener("DOMContentLoaded", getPostDetail);
    </script>
</body>
</html>
