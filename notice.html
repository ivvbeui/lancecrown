<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through love - Notice</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>
    <div class="main-container">
        <div class="inner-frame">

            <div class="left-sidebar">
                <div class="header-text">
                    <h1 class="blog-name">La Via Lactea</h1>
                    <p class="status-text" onclick="toggleProfile()">from 2024~</p>
                </div>
                <div id="profile-section" class="profile-box collapsed">
                    <div class="gray-rect profile-img">
                      <img src="img/profile.webp" alt="프로필">
                    </div>
                </div>
                <div class="menu-box">
                    <div class="emoji-row">
                        <span class="emoji" onclick="toggleMenu(0)">🫂</span>
                        <span class="emoji" onclick="toggleMenu(1)">🎥</span>
                        <span class="emoji" onclick="toggleMenu(2)">🏠</span>
                    </div>
                    <div class="menu-list-container">
                        <div id="list-0" class="list-item">
                            <p><a href="index.html">home</a></p>
                            <p><a href="notice.html">notice</a></p>
                        </div>
                        <div id="list-1" class="list-item">
                            <p><a href="list.html">list</a></p>
                            <p><a href="gallery.html">gallery</a></p>
                        </div>
                        <div id="list-2" class="list-item">
                            <p>ing...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-content">
                <div class="board-container notice-scroll-container">
                    <div class="post-detail-header">
                        <h2 class="post-detail-title" id="notice-title">공지사항을 불러오는 중...</h2>
                        <p class="post-detail-meta" id="notice-meta"></p>
                    </div>

                    <div class="post-detail-body">
                        <p id="notice-content"></p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>

    <script type="module">
        import { db } from "./firebase-config.js";
        // 🚨 최신글 1개만 제한해서 가져오기 위해 limit를 추가로 임포트합니다.
        import { collection, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        async function loadLatestNotice() {
            try {
                // 🚨 핵심: type이 notice인 글 중, timestamp 기준 가장 최신글 딱 '1개'만 가져옴
                const q = query(
                    collection(db, "posts"),
                    where("type", "==", "notice"),
                    orderBy("timestamp", "desc"),
                    limit(1)
                );

                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    document.getElementById('notice-title').innerText = "등록된 공지사항이 없습니다.";
                    return;
                }

                // 첫 번째 문서 데이터 추출
                const docSnap = querySnapshot.docs[0];
                const data = docSnap.data();

                // 화면에 바로 뿌려주기
                document.getElementById('notice-title').innerText = `[공지] ${data.title}`;
                document.getElementById('notice-meta').innerText = data.date;
                // 줄바꿈 처리
                document.getElementById('notice-content').innerHTML = data.content.replace(/\n/g, '<br>');

            } catch (error) {
                console.error("공지사항 로딩 에러:", error);
                document.getElementById('notice-title').innerText = "공지사항을 불러오지 못했습니다.";
            }
        }

        window.addEventListener("DOMContentLoaded", loadLatestNotice);
    </script>
</body>
</html>
