<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through love</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>
    <div class="main-container">
        <div class="inner-frame">

            <div class="left-sidebar">
                <div class="header-text">
                    <h1 class="blog-name">La Via Lactea</h1>
                    <p class="status-text" onclick="toggleProfile()">from 2024~</p>
                </div>
                <div id="profile-section" class="profile-box collapsed">
                    <div class="gray-rect profile-img">
                      <img src="img/profile.webp" alt="프로필">
                    </div>
                </div>
                <div class="menu-box">
                    <div class="emoji-row">
                        <span class="emoji" onclick="toggleMenu(0)">🫂</span>
                        <span class="emoji" onclick="toggleMenu(1)">🎥</span>
                        <span class="emoji" onclick="toggleMenu(2)">🏠</span>
                    </div>
                    <div class="menu-list-container">
                        <div id="list-0" class="list-item">
                            <p><a href="index.html">home</a></p>
                            <p><a href="notice.html">notice</a></p>
                        </div>
                        <div id="list-1" class="list-item">
                            <p><a href="list.html">list</a></p>
                            <p><a href="gallery.html">gallery</a></p>
                        </div>
                        <div id="list-2" class="list-item">
                            <p>ing...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-content">
                <div class="board-container">
                    <div class="board-header">list</div>

                    <div class="post-list" id="pagination-list">
                        </div>

                    <div class="pagination">
                        <span class="btn" id="prev-btn">&lt;</span>
                        <span id="page-num">1 / 1</span>
                        <span class="btn" id="next-btn">&gt;</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        let allPosts = [];     // 서버에서 가져온 해당 타입의 전체 글 저장용
        let currentPage = 1;   // 현재 페이지 번호
        const postsPerPage = 6; // 6개 이상이 되면 다음 페이지로!

        async function loadListPosts() {
            const listContainer = document.getElementById('pagination-list');
            if (!listContainer) return;

            try {
                // 🚨 핵심: type이 'list'인 글들을 timestamp 기준 내림차순(최신순)으로 정렬해서 쿼리
                const q = query(
                    collection(db, "posts"),
                    where("type", "==", "list"),
                    orderBy("timestamp", "desc")
                );

                const querySnapshot = await getDocs(q);
                allPosts = []; // 배열 초기화

                querySnapshot.forEach((doc) => {
                    allPosts.push({ id: doc.id, ...doc.data() });
                });

                // 데이터를 다 가져왔으면 첫 페이지 렌더링 시작
                renderPage();

            } catch (error) {
                console.error("데이터 불러오기 에러:", error);
                // 만약 콘솔에 'index' 관련 에러(색인 생성 필요)가 뜨면 아래 안내 확인!
            }
        }

        // 현재 페이지에 맞는 글 6개만 화면에 뿌려주는 함수
        function renderPage() {
            const listContainer = document.getElementById('pagination-list');
            listContainer.innerHTML = "";

            if (allPosts.length === 0) {
                listContainer.innerHTML = "<p style='font-size:12px; color:#999; padding:10px;'>작성된 게시글이 없습니다.</p>";
                updatePaginationUI();
                return;
            }

            // 현재 페이지에 보여줄 글의 시작 인덱스와 끝 인덱스 계산 (예: 1페이지면 0~5번 글)
            const startIndex = (currentPage - 1) * postsPerPage;
            const endIndex = Math.min(startIndex + postsPerPage, allPosts.length);

            // 6개만 쏙 잘라서 화면에 그리기
            for (let i = startIndex; i < endIndex; i++) {
                const data = allPosts[i];
                const postHTML = `
                    <a href="post.html?id=${data.id}" class="post-item">
                        <span class="post-title">${data.title}</span>
                        <span class="post-date">${data.date}</span>
                    </a>
                `;
                listContainer.innerHTML += postHTML;
            }

            // 하단 페이지네이션 버튼 글자 및 상태 업데이트
            updatePaginationUI();
        }

        function updatePaginationUI() {
            const totalPages = Math.max(1, Math.ceil(allPosts.length / postsPerPage));
            document.getElementById('page-num').innerText = `${currentPage} / ${totalPages}`;
        }

        // ◀ 버튼 클릭 이벤트
        document.getElementById('prev-btn').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderPage();
            }
        });

        // ▶ 버튼 클릭 이벤트
        document.getElementById('next-btn').addEventListener('click', () => {
            const totalPages = Math.ceil(allPosts.length / postsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderPage();
            }
        });

        // 페이지 로드 시 가동
        window.addEventListener("DOMContentLoaded", loadListPosts);
    </script>
</body>
</html>
